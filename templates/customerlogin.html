{% extends "base.html" %}

{% block title %}Customer Login{% endblock %}

{% block content %}

<style>
    .errorlist {
        color: red;
        list-style: none;
    }
</style>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white text-center">
                    <h4 class="mb-0">Customer Login</h4>
                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                        {% endif %}

                        <button class="btn btn-primary w-100 mt-3">
                            Login
                        </button>

                    </form>

                </div>

                <div class="card-footer text-center">

                    Don't have an account?

                    <a href="{% url 'app1:customerregistration' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                        Register here
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
